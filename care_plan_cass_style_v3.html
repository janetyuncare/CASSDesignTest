
<div style="max-width:380px;margin:0 auto">
<h2 class="sr-only">[Provider view] Check-in Screen w/ Care Plan Section</h2>

<div style="text-align:center;font-size:12px;letter-spacing:1px;color:#8a8a86;margin-bottom:10px;text-transform:uppercase">Caregiver — Sarah</div>

<div style="background:#0d0d0d;border-radius:44px;padding:14px;box-shadow:none">
<div style="background:#f4f2ec;border-radius:32px;overflow:hidden">

  <div style="background:#1f4a3d;padding:16px 18px 18px;position:relative">
    <div style="width:110px;height:22px;background:#0d0d0d;border-radius:12px;margin:0 auto 14px"></div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <span style="color:#fff;font-size:15px;font-weight:500">9:02</span>
      <div style="display:flex;gap:5px;align-items:center">
        <i class="ti ti-antenna-bars-5" style="font-size:15px;color:#fff" aria-hidden="true"></i>
        <i class="ti ti-wifi" style="font-size:15px;color:#fff" aria-hidden="true"></i>
        <i class="ti ti-battery-2" style="font-size:15px;color:#fff" aria-hidden="true"></i>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:6px;margin-bottom:10px">
      <div style="width:20px;height:20px;border-radius:6px;background:#c8e08a;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#1f4a3d">C</div>      <span style="color:#fff;font-size:13px">Care.com</span>
      <span style="color:#fff;font-size:13px">Care.com</span>
      <span style="color:#c8e08a;font-size:13px">· Caregiver</span>
    </div>
    <p style="color:#fff;font-size:22px;font-weight:600;margin:0 0 4px">Shift check-in</p>
    <p style="color:#b9c9c0;font-size:13px;margin:0">Verify your arrival</p>
  </div>

  <div style="padding:16px 16px 18px;display:flex;flex-direction:column;gap:14px">
    
    <p style="font-weight:600;font-size:15px;color:#1a1a17;margin:0 2px">Safety Review</p>
    
 <div style="background:#fff;border-radius:16px;padding:2px 4px">
      <button id="checklistToggle" style="all:unset;cursor:pointer;display:flex;align-items:center;justify-content:space-between;width:100%;padding:14px;box-sizing:border-box">
        <span style="font-weight:600;font-size:15px;color:#1a1a17">Pre-Shift Checklist (first 15 min)</span>
        <svg id="checklistChevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#8a8a86" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"></polyline></svg>
      </button>
      <div id="checklistBody" style="padding:0 14px 14px;display:flex;flex-direction:column;gap:8px"></div>
    </div>

    <p style="font-weight:600;font-size:15px;color:#1a1a17;margin:0 2px">Care plan</p>

    <div id="childCards" style="display:flex;flex-direction:column;gap:12px"></div>

    <button id="ackBtn" style="width:100%;background:#1f4a3d;color:#fff;border:none;font-weight:600;font-size:15px;padding:14px;border-radius:16px;display:flex;align-items:center;justify-content:center;gap:8px">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
      <span id="ackLabel">Confirm & start shift</span>
    </button>

  </div>

  <div style="display:flex;justify-content:space-around;padding:10px 8px 16px;border-top:0.5px solid #e2e0d8">
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px;color:#1f4a3d">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#1f4a3d" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 11.5 12 4l9 7.5"></path>
        <path d="M5.5 9.5V20a1 1 0 0 0 1 1H9a1 1 0 0 0 1-1v-4a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v4a1 1 0 0 0 1 1h2.5a1 1 0 0 0 1-1V9.5"></path>
      </svg>
      <span style="font-size:11px;font-weight:500">Home</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px;color:#8a8a86">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#8a8a86" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="6" y="4" width="12" height="17" rx="2"></rect>
        <path d="M9 3.5h6a1 1 0 0 1 1 1V6a1 1 0 0 1-1 1H9a1 1 0 0 1-1-1V4.5a1 1 0 0 1 1-1Z"></path>
        <polyline points="9 13 11 15 15 11"></polyline>
      </svg>
      <span style="font-size:11px">Tasks</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px;color:#8a8a86">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#8a8a86" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 8a2 2 0 0 1 2-2h1.2a2 2 0 0 0 1.66-.9l.6-.9a2 2 0 0 1 1.66-.9h1.68a2 2 0 0 1 1.66.9l.6.9a2 2 0 0 0 1.66.9H18a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2Z"></path>
        <circle cx="12" cy="13" r="3.2"></circle>
      </svg>
      <span style="font-size:11px">Report</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px;color:#8a8a86">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#8a8a86" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M7 3.5h7l4 4V19a1.5 1.5 0 0 1-1.5 1.5h-9A1.5 1.5 0 0 1 6 19V5A1.5 1.5 0 0 1 7 3.5Z"></path>
        <polyline points="14 3.5 14 7.5 18 7.5"></polyline>
        <line x1="9" y1="12" x2="15" y2="12"></line>
        <line x1="9" y1="15.5" x2="15" y2="15.5"></line>
      </svg>
      <span style="font-size:11px">Record</span>
    </div>
  </div>

</div>
</div>
</div>

<script>
function chevronSvg(open, size, color){
  const pts = open ? '18 15 12 9 6 15' : '6 9 12 15 18 9';
  return `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0"><polyline points="${pts}"></polyline></svg>`;
}

const checklist = [
  'Front door locked','Child count confirmed (2)','Hazards scanned','Care plan reviewed'
];
let checklistOpen = true;

function renderChecklist(){
  document.getElementById('checklistBody').innerHTML = checklist.map(item => `
    <div style="background:#f4f2ec;border-radius:12px;padding:9px 12px;display:flex;align-items:center;gap:9px">
      <div style="width:18px;height:18px;border-radius:50%;background:#e3efce;display:flex;align-items:center;justify-content:center;flex-shrink:0">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#3b6d11" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
      </div>
      <span style="font-size:12.5px;color:#4a4a45">${item}</span>
    </div>
  `).join('');
  document.getElementById('checklistBody').style.display = checklistOpen ? 'flex' : 'none';
  document.getElementById('checklistChevron').outerHTML = chevronSvg(checklistOpen, 16, '#8a8a86').replace('<svg', '<svg id="checklistChevron"');
}
document.getElementById('checklistToggle').addEventListener('click', () => { checklistOpen = !checklistOpen; renderChecklist(); });
renderChecklist();

const children = [
  {
    id:'liam', name:'Liam, age 6', updated:'Updated yesterday', open:true,
    sections:[
      {icon:'first-aid', title:'Health and safety', disclaimer:true, open:true, rows:[
        ['Allergies','Peanuts. EpiPen in kitchen drawer.'],
        ['Conditions','Mild asthma, uses inhaler if wheezing.'],
        ['Medication reminder','None scheduled today.']]},
      {icon:'clock', title:'Daily routine', rows:[
        ['Meals','Lunch at noon, no dairy.'],
        ['Nap','1-3pm, needs white noise.']]},
      {icon:'smile', title:'Behavior and preferences', rows:[
        ['Notes','Gets overwhelmed by loud noise, use quiet corner to reset.']]},
      {icon:'phone', title:'Emergency info', rows:[
        ['1. Mom','555-0100'],['2. Grandma','555-0110'],['Pediatrician','Dr. Lee, 555-0120']]}
    ]
  },
  {
    id:'ava', name:'Ava, age 3', updated:'Updated 5 days ago', open:false,
    sections:[
      {icon:'first-aid', title:'Health and medical', disclaimer:true, rows:[
        ['Allergies','None on file.'],
        ['Conditions','None on file.'],
        ['Medication reminder','None scheduled today.']]},
      {icon:'clock', title:'Daily routine', open:true, rows:[
        ['Meals','Snack at 2pm, cuts grapes in half.'],
        ['Nap','12:30-2pm, needs pacifier.']]},
      {icon:'smile', title:'Behavior and preferences', rows:[
        ['Notes','Shy with new people, warms up after 10-15 min.']]},
      {icon:'phone', title:'Emergency info', rows:[
        ['1. Mom','555-0100'],['2. Grandma','555-0110'],]}
    ]
  }
];

function sectionIconSvg(name){
  const icons = {
    'first-aid': '<path d="M4 8a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2Z"></path><path d="M9 6V4.5a1.5 1.5 0 0 1 1.5-1.5h3A1.5 1.5 0 0 1 15 4.5V6"></path><line x1="12" y1="10.5" x2="12" y2="15.5"></line><line x1="9.5" y1="13" x2="14.5" y2="13"></line>',
    'clock': '<circle cx="12" cy="12" r="8.5"></circle><polyline points="12 7.5 12 12 15.5 14"></polyline>',
    'smile': '<circle cx="12" cy="12" r="8.5"></circle><path d="M8 14s1.5 2 4 2 4-2 4-2"></path><line x1="8.5" y1="9.5" x2="8.5" y2="9.6"></line><line x1="15.5" y1="9.5" x2="15.5" y2="9.6"></line>',
    'phone': '<path d="M6 3.5h2.5l1.3 3.5-1.7 1.7a11 11 0 0 0 5.2 5.2l1.7-1.7 3.5 1.3V16a2 2 0 0 1-2.2 2A16 16 0 0 1 4 4.7 2 2 0 0 1 6 3.5Z"></path>'
  };
  return `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#1f4a3d" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0">${icons[name]}</svg>`;
}

function renderChildren(){
  const el = document.getElementById('childCards');
  el.innerHTML = children.map((c,ci) => `
    <div style="background:#fff;border-radius:16px;padding:2px 4px">
      <button class="child-toggle" data-i="${ci}" style="all:unset;cursor:pointer;display:flex;align-items:center;justify-content:space-between;width:100%;padding:14px;box-sizing:border-box">
        <span style="display:flex;align-items:baseline;gap:8px">
          <span style="font-weight:600;font-size:15px;color:#1a1a17">${c.name}</span>
          <span style="font-size:11px;color:#8a8a86">${c.updated}</span>
        </span>
        ${chevronSvg(c.open, 16, '#8a8a86')}
      </button>
      ${c.open ? `<div style="padding:0 14px 14px;display:flex;flex-direction:column;gap:8px">
        ${c.sections.map((s,si) => `
          <div style="background:#f4f2ec;border-radius:12px;padding:10px 12px">
            <button class="sec-toggle" data-ci="${ci}" data-si="${si}" style="all:unset;cursor:pointer;display:flex;align-items:center;justify-content:space-between;width:100%;box-sizing:border-box;${s.open ? 'margin-bottom:8px' : ''}">
              <span style="display:flex;align-items:center;gap:7px">
                ${sectionIconSvg(s.icon)}
                <span style="font-weight:500;font-size:13px;color:#1a1a17">${s.title}</span>
              </span>
              ${chevronSvg(s.open, 14, '#8a8a86')}
            </button>
            ${s.open ? `
              ${s.disclaimer ? `<div style="display:flex;gap:5px;align-items:center;background:#fff;border-radius:8px;padding:6px 8px;margin-bottom:8px;white-space:nowrap;overflow:hidden">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#8a8a86" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0"><circle cx="12" cy="12" r="8.5"></circle><line x1="12" y1="11" x2="12" y2="16"></line><line x1="12" y1="8" x2="12" y2="8.1"></line></svg>
                <p style="font-size:10px;color:#8a8a86;margin:0;text-overflow:ellipsis;overflow:hidden">Reference only — Confirm health protocols with family.</p>
              </div>` : ''}
              ${s.rows.map((r,ri) => `<p style="font-size:12.5px;margin:0 0 ${ri < s.rows.length-1 ? '5px' : '0'};color:#4a4a45"><span style="color:#8a8a86">${r[0]} · </span>${r[1]}</p>`).join('')}
            ` : ''}
          </div>
        `).join('')}
      </div>` : ''}
    </div>
  `).join('');

  el.querySelectorAll('.child-toggle').forEach(btn => btn.addEventListener('click', () => {
    children[parseInt(btn.dataset.i)].open = !children[parseInt(btn.dataset.i)].open;
    renderChildren();
  }));
  el.querySelectorAll('.sec-toggle').forEach(btn => btn.addEventListener('click', (e) => {
    e.stopPropagation();
    const ci = parseInt(btn.dataset.ci), si = parseInt(btn.dataset.si);
    children[ci].sections[si].open = !children[ci].sections[si].open;
    renderChildren();
  }));
}
renderChildren();

document.getElementById('ackBtn').addEventListener('click', function(){
  document.getElementById('ackLabel').textContent = 'Confirmed at ' + new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
  this.style.opacity = '0.7';
  this.disabled = true;
});
</script>
